# Home Ambient YAML file for ESPHome Compiler
# place below autogenerated lines
    
i2c:
  sda: GPIO6
  scl: GPIO7
  frequency: 400kHz
  scan: true
  id: bus_a

bme68x_bsec2_i2c:
  i2c_id: bus_a
  address: 0x77
  model: bme680
  operating_age: 28d
  sample_rate: LP
  supply_voltage: 3.3V

sensor:
  - platform: adc
    pin: GPIO1
    name: "VCC"
    filters:
      - multiply: 2000
    attenuation: 12db
    unit_of_measurement: "mV"
    update_interval: 2s

  - platform: adc
    pin: GPIO0
    name: "BMS"
    filters:
      - multiply: 2000
    attenuation: 12db
    unit_of_measurement: "mV"
    update_interval: 2s

  - platform: bme68x_bsec2
    temperature:
      id: temperature_sensor
      name: "Temperature"
    pressure:
      name: "Pressure"
    humidity:
      name: "Humidity"
    iaq:
      name: "IAQ"
      id: iaq
    co2_equivalent:
      name: "CO2 Equivalent"
    breath_voc_equivalent:
      name: "Breath VOC Equivalent"

text_sensor:
    - platform: bme68x_bsec2
      iaq_accuracy:
        name: "IAQ Accuracy"

    - platform: template
      name: "IAQ Classification"
      lambda: |-
        if ( int(id(iaq).state) <= 50) {
          return {"Excellent"};
        }
        else if (int(id(iaq).state) >= 51 && int(id(iaq).state) <= 100) {
          return {"Good"};
        }
         else if (int(id(iaq).state) >= 101 && int(id(iaq).state) <= 150) {
            return {"Lightly polluted"};
        }
        else if (int(id(iaq).state) >= 151 && int(id(iaq).state) <= 200) {
            return {"Moderately polluted"};
        }
        else if (int(id(iaq).state) >= 201 && int(id(iaq).state) <= 250) {
            return {"Heavily polluted"};
        }
        else if (int(id(iaq).state) >= 251 && int(id(iaq).state) <= 350) {
            return {"Severely polluted"};
        }
        else if (int(id(iaq).state) >= 351) {
            return {"Extremely polluted"};
        }
        else {
            return {"error"};
        }

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO8
    num_leds: 1
    rmt_channel: 1
    chipset: SK6812
    name: "RGB"

switch:
  - platform: gpio
    id: heater_switch
    pin: GPIO4
    name: "Heater"

climate:
  - platform: thermostat
    name: "Thermostat"
    sensor: temperature_sensor
    visual:
      min_temperature: 10
      max_temperature: 28
      temperature_step: 0.2

    min_heating_off_time: 30s
    min_heating_run_time: 5s
    min_idle_time: 30s
    heat_deadband: 0.3
    heat_overrun: 0.5
    
    heat_action:
      - switch.turn_on: heater_switch
    idle_action:
      - switch.turn_off: heater_switch
    default_preset: Home
    preset:
      - name: Home
        default_target_temperature_low: 12 °C
